<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nautical Mile – Reservation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: 
        radial-gradient(circle at 15% 20%, rgba(34, 211, 238, 0.6) 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(74, 222, 128, 0.5) 0%, transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(100, 200, 255, 0.35), transparent),
        radial-gradient(circle at 30% 70%, rgba(16, 185, 129, 0.3), transparent),
        radial-gradient(circle at 70% 30%, rgba(34, 211, 238, 0.25), transparent),
        linear-gradient(135deg, #38bdf8 0%, #22d3ee 12%, #10b981 25%, #14b8a6 37%, #06b6d4 50%, #22d3ee 62%, #10b981 75%, #0284c7 87%, #6ee7b7 100%);
      background-size: 100% 100%;
      background-attachment: fixed;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: backgroundPulse 8s ease infinite alternate, backgroundRotate 20s linear infinite;
    }
    
    @keyframes backgroundPulse {
      0% { filter: hue-rotate(0deg) brightness(1) saturate(1.3); }
      100% { filter: hue-rotate(20deg) brightness(1.15) saturate(1.6); }
    }
    
    @keyframes backgroundRotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Floating bubbles effect */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.25) 0%, transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.22) 0%, transparent 38%),
        radial-gradient(circle at 60% 20%, rgba(74, 222, 128, 0.2) 0%, transparent 36%),
        radial-gradient(circle at 30% 60%, rgba(34, 211, 238, 0.18) 0%, transparent 34%),
        radial-gradient(circle at 70% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 32%),
        radial-gradient(circle at 50% 90%, rgba(74, 222, 128, 0.16) 0%, transparent 35%);
      animation: floatComplex 22s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes floatComplex {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(50px, -50px) rotate(72deg); }
      40% { transform: translate(-40px, 40px) rotate(144deg); }
      60% { transform: translate(45px, -35px) rotate(216deg); }
      80% { transform: translate(-35px, 45px) rotate(288deg); }
    }
    
    .container {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.65) 0%,
        rgba(255, 255, 255, 0.35) 50%,
        rgba(255, 255, 255, 0.55) 100%);
      backdrop-filter: blur(30px) saturate(220%) brightness(1.2);
      -webkit-backdrop-filter: blur(30px) saturate(220%) brightness(1.2);
      border-radius: 40px;
      padding: 56px 48px;
      max-width: 750px;
      box-shadow: 0 25px 70px rgba(34, 211, 238, 0.5),
                  0 0 140px rgba(74, 222, 128, 0.4),
                  0 0 200px rgba(34, 211, 238, 0.3),
                  inset 0 4px 0 rgba(255, 255, 255, 0.85),
                  inset 0 -4px 0 rgba(255, 255, 255, 0.5);
      border: 4px solid rgba(255, 255, 255, 0.7);
      animation: containerGlow 3.5s ease-in-out infinite alternate;
      position: relative;
      overflow: hidden;
    }
    
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 65%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, transparent 100%);
      pointer-events: none;
    }
    
    .container::after {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.5), rgba(74, 222, 128, 0.3) 50%, transparent 75%);
      border-radius: 50%;
      top: -120px;
      right: -120px;
      pointer-events: none;
      animation: orbFloat 7s ease-in-out infinite;
      filter: blur(2px);
    }
    
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.7; }
      50% { transform: translate(-40px, 40px) scale(1.3) rotate(180deg); opacity: 1; }
    }
    
    @keyframes containerGlow {
      from {
        box-shadow: 0 25px 70px rgba(34, 211, 238, 0.5),
                    0 0 140px rgba(74, 222, 128, 0.4),
                    0 0 200px rgba(34, 211, 238, 0.3),
                    inset 0 4px 0 rgba(255, 255, 255, 0.85),
                    inset 0 -4px 0 rgba(255, 255, 255, 0.5);
      }
      to {
        box-shadow: 0 25px 70px rgba(74, 222, 128, 0.6),
                    0 0 160px rgba(34, 211, 238, 0.5),
                    0 0 240px rgba(74, 222, 128, 0.4),
                    inset 0 4px 0 rgba(255, 255, 255, 0.95),
                    inset 0 -4px 0 rgba(255, 255, 255, 0.6);
      }
    }
    
    h1 {
      font-size: 3.2rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #e0f2fe 30%, #a5f3fc 60%, #5eead4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4));
      letter-spacing: -1.5px;
      animation: textShimmer 5s ease infinite;
      position: relative;
      z-index: 1;
    }
    
    @keyframes textShimmer {
      0%, 100% { filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4)); }
      50% { filter: drop-shadow(0 8px 30px rgba(34, 211, 238, 0.6)); }
    }
    
    p {
      font-size: 1.18rem;
      max-width: 580px;
      margin: 0 auto 2.8rem;
      line-height: 1.8;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
      color: rgba(255, 255, 255, 0.95);
      position: relative;
      z-index: 1;
    }
    
    strong {
      color: #fff;
      font-weight: 700;
    }
    
    a {
      display: inline-block;
      padding: 18px 38px;
      background: linear-gradient(135deg, #22d3ee 0%, #10b981 50%, #14b8a6 100%);
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-weight: bold;
      font-size: 1.15rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5),
                  0 0 60px rgba(34, 211, 238, 0.4),
                  inset 0 2px 0 rgba(255, 255, 255, 0.6),
                  inset 0 -2px 0 rgba(0, 0, 0, 0.15);
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    a::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
      pointer-events: none;
    }
    
    a::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: rotate(45deg);
      animation: shineEffect 4s infinite;
    }
    
    @keyframes shineEffect {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    a:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 16px 45px rgba(16, 185, 129, 0.6),
                  0 0 80px rgba(34, 211, 238, 0.5),
                  inset 0 2px 0 rgba(255, 255, 255, 0.7),
                  inset 0 -2px 0 rgba(0, 0, 0, 0.15);
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
      .container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Decorative floating orbs -->
  <div style="position: fixed; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(34, 211, 238, 0.4) 35%, rgba(74, 222, 128, 0.25) 55%, transparent 75%); top: 10%; left: 5%; pointer-events: none; z-index: 0; box-shadow: inset -15px -15px 40px rgba(255, 255, 255, 0.7), inset 8px 8px 25px rgba(34, 211, 238, 0.4), 0 0 90px rgba(34, 211, 238, 0.6), 0 0 140px rgba(74, 222, 128, 0.4); animation: orb1 18s ease-in-out infinite; filter: blur(0.5px);"></div>
  <div style="position: fixed; width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.55), rgba(74, 222, 128, 0.4) 35%, rgba(34, 211, 238, 0.25) 55%, transparent 75%); bottom: 15%; right: 8%; pointer-events: none; z-index: 0; box-shadow: inset -12px -12px 35px rgba(255, 255, 255, 0.7), inset 6px 6px 22px rgba(74, 222, 128, 0.4), 0 0 75px rgba(74, 222, 128, 0.6), 0 0 120px rgba(34, 211, 238, 0.4); animation: orb2 14s ease-in-out infinite; filter: blur(0.5px);"></div>
  <div style="position: fixed; width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.5), rgba(34, 211, 238, 0.35) 35%, rgba(74, 222, 128, 0.2) 55%, transparent 75%); top: 50%; left: 12%; pointer-events: none; z-index: 0; box-shadow: inset -10px -10px 30px rgba(255, 255, 255, 0.6), inset 5px 5px 18px rgba(34, 211, 238, 0.3), 0 0 65px rgba(34, 211, 238, 0.5), 0 0 100px rgba(74, 222, 128, 0.3); animation: orb3 20s ease-in-out infinite; filter: blur(0.5px);"></div>
  <!-- Additional micro bubbles -->
  <div style="position: fixed; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.75), rgba(34, 211, 238, 0.5) 50%, transparent 70%); top: 30%; right: 20%; pointer-events: none; z-index: 0; box-shadow: inset -6px -6px 18px rgba(255, 255, 255, 0.8), 0 0 50px rgba(34, 211, 238, 0.7); animation: orb4 16s ease-in-out infinite;"></div>
  <div style="position: fixed; width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7), rgba(74, 222, 128, 0.5) 50%, transparent 70%); bottom: 35%; left: 18%; pointer-events: none; z-index: 0; box-shadow: inset -8px -8px 22px rgba(255, 255, 255, 0.8), 0 0 55px rgba(74, 222, 128, 0.7); animation: orb5 15s ease-in-out infinite;"></div>
  <div style="position: fixed; width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(34, 211, 238, 0.55) 50%, transparent 70%); top: 65%; right: 15%; pointer-events: none; z-index: 0; box-shadow: inset -5px -5px 15px rgba(255, 255, 255, 0.9), 0 0 45px rgba(34, 211, 238, 0.8); animation: orb6 17s ease-in-out infinite;"></div>
  <!-- Lens flares -->
  <div style="position: fixed; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent 55%); top: 8%; right: 10%; pointer-events: none; z-index: 0; animation: lensFlare1 9s ease-in-out infinite; filter: blur(4px);"></div>
  <div style="position: fixed; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(74, 222, 128, 0.25), transparent 55%); bottom: 12%; left: 8%; pointer-events: none; z-index: 0; animation: lensFlare2 11s ease-in-out infinite 2s; filter: blur(4px);"></div>
  <div style="position: fixed; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(34, 211, 238, 0.22), transparent 55%); top: 40%; right: 5%; pointer-events: none; z-index: 0; animation: lensFlare3 10s ease-in-out infinite 4s; filter: blur(4px);"></div>
  
  <style>
    @keyframes orb1 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.8; }
      33% { transform: translate(50px, -60px) scale(1.4) rotate(120deg); opacity: 1; }
      66% { transform: translate(-40px, 50px) scale(0.9) rotate(240deg); opacity: 0.85; }
    }
    @keyframes orb2 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.75; }
      50% { transform: translate(-60px, -50px) scale(1.35) rotate(180deg); opacity: 0.95; }
    }
    @keyframes orb3 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.7; }
      40% { transform: translate(45px, -55px) scale(1.3) rotate(144deg); opacity: 0.9; }
      80% { transform: translate(-35px, 45px) scale(0.95) rotate(288deg); opacity: 0.75; }
    }
    @keyframes orb4 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.85; }
      50% { transform: translate(35px, 40px) scale(1.5); opacity: 1; }
    }
    @keyframes orb5 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
      50% { transform: translate(-30px, -45px) scale(1.45); opacity: 1; }
    }
    @keyframes orb6 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.75; }
      50% { transform: translate(25px, -50px) scale(1.4); opacity: 0.95; }
    }
    @keyframes lensFlare1 {
      0%, 100% { opacity: 0.4; transform: scale(1) rotate(0deg); }
      50% { opacity: 0.8; transform: scale(1.4) rotate(180deg); }
    }
    @keyframes lensFlare2 {
      0%, 100% { opacity: 0.35; transform: scale(1) rotate(0deg); }
      50% { opacity: 0.75; transform: scale(1.35) rotate(-180deg); }
    }
    @keyframes lensFlare3 {
      0%, 100% { opacity: 0.3; transform: scale(1) rotate(0deg); }
      50% { opacity: 0.7; transform: scale(1.3) rotate(180deg); }
    }
  </style>
  
  <div class="container">
    <h1>Reservation Attempted!</h1>
    <p>Thank you for trying to reserve a table at <strong>The Nautical Mile</strong>.  
       Unfortunately, this table is entirely fictional – it doesn't exist in the real world.  
       But since you've come this far, we wouldn't want to leave you empty-handed...</p>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Click here for a surprise 🎶</a>
  </div>
</body>
</html>
